<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STATUS DA PERMUTA</title>
    <style>
        body { font-family: sans-serif; background: #ddd; padding: 10px; }
        .bloco { background: white; margin-bottom: 10px; padding: 20px; border-radius: 10px; text-align: center; border: 2px solid #999; }
        .ACEITO { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .NEGADO { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .figura { font-size: 80px; display: block; }
        h1 { font-size: 25px; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="conteudo">Carregando dados do servidor...</div>

    <script>
        async function atualizar() {
            try {
                const r = await fetch('/lista-permutas');
                const dados = await r.json();
                let html = "";
                
                dados.forEach(p => {
                    let icone = "⏳";
                    let txt = "AGUARDANDO";
                    let classe = "";

                    if(p.status === "HOMOLOGADO") {
                        icone = "✅";
                        txt = "ACEITO";
                        classe = "ACEITO";
                    } else if(p.status === "NEGADO") {
                        icone = "❌";
                        txt = "NEGADO";
                        classe = "NEGADO";
                    }

                    html += `<div class="bloco ${classe}">
                                <span class="figura">${icone}</span>
                                <h1>${txt}</h1>
                                <p>${p.solicitanteNome} ➔ ${p.substitutoNome}</p>
                             </div>`;
                });
                document.getElementById('conteudo').innerHTML = html;
            } catch (e) {
                document.getElementById('conteudo').innerHTML = "Erro ao conectar. O servidor está ligado?";
            }
        }
        setInterval(atualizar, 2000);
        atualizar();
    </script>
</body>
</html>
