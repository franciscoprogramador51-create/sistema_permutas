<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinete CBMCE - Despacho</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #c0392b; color: white; padding: 20px; margin: 0; }
        .painel { max-width: 1100px; margin: auto; background: white; color: #333; padding: 25px; border-radius: 10px; border-top: 10px solid #f1c40f; }
        h2 { text-align: center; color: #c0392b; text-transform: uppercase; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th { background: #c0392b; color: #f1c40f; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .btn-aceitar { background: #27ae60; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-negar { background: #c0392b; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        footer { margin-top: 50px; text-align: center; color: #f1c40f; font-weight: bold; text-shadow: 1px 1px 2px black; }
        .badge-pendente { color: #e67e22; font-weight: bold; }
        .badge-aceito { color: #27ae60; font-weight: bold; }
        .badge-negado { color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>
    <div class="painel">
        <h2>🎖️ Gabinete de Comando - Painel de Despacho</h2>
        <table id="tabela">
            <thead>
                <tr>
                    <th>Solicitante (Mat.)</th>
                    <th>Substituto (Mat.)</th>
                    <th>Data do Serviço</th>
                    <th>Tipo</th>
                    <th>Status</th>
                    <th>Despacho</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <footer>SISTEMA DE CONTROLE DE PERMUTAS - CBMCE</footer>

    <script>
        async function carregar() {
            const res = await fetch('/lista-permutas');
            const dados = await res.json();
            const corpo = document.querySelector('#tabela tbody');
            corpo.innerHTML = "";

            dados.forEach(p => {
                let statusCor = p.status === 'PENDENTE' ? 'badge-pendente' : (p.status === 'HOMOLOGADO' ? 'badge-aceito' : 'badge-negado');
                
                corpo.innerHTML += `
                <tr>
                    <td><b>${p.solicitanteNome}</b><br><small>Mat: ${p.solicitanteMatricula}</small></td>
                    <td><b>${p.substitutoNome}</b><br><small>Mat: ${p.substitutoMatricula}</small></td>
                    <td>${p.dataServico}</td>
                    <td><strong>${p.tipoPermuta || 'Simples'}</strong></td>
                    <td class="${statusCor}">${p.status}</td>
                    <td>
                        ${p.status === 'PENDENTE' ? 
                        `<button class="btn-aceitar" onclick="decidir(${p.id}, 'homologar')">ACEITAR</button>
                         <button class="btn-negar" onclick="decidir(${p.id}, 'negar')">NEGAR</button>` : '---'}
                    </td>
                </tr>`;
            });
        }

        async function decidir(id, rota) {
            if(confirm("Confirmar decisão de despacho?")) {
                await fetch(`/${rota}/${id}`, { method: 'PUT' });
                carregar();
            }
        }

        carregar();
        setInterval(carregar, 5000);
    </script>
</body>
</html>
