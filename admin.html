<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinete CBMCE - Despacho</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #c0392b; color: white; padding: 20px; margin: 0; }
        .painel { max-width: 1000px; margin: auto; background: white; color: #333; padding: 25px; border-radius: 10px; border-top: 10px solid #f1c40f; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #c0392b; margin-top: 0; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th { background: #c0392b; color: #f1c40f; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        .status-badge { font-weight: bold; padding: 5px 10px; border-radius: 4px; text-transform: uppercase; font-size: 12px; }
        .PENDENTE { background: #fff3e0; color: #e67e22; }
        .HOMOLOGADO { background: #e8f5e9; color: #27ae60; }
        .NEGADO { background: #ffebee; color: #c0392b; }
        .btn-aceitar { background: #27ae60; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-negar { background: #c0392b; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="painel">
        <h2>🎖️ Gabinete de Comando - Despacho.</h2>
        <table id="tabelaPermutas">
            <thead>
                <tr>
                    <th>Solicitante (Mat.)</th>
                    <th>Substituto (Mat.)</th>
                    <th>Data</th>
                    <th>Status</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        async function carregar() {
            const res = await fetch('/lista-permutas');
            const dados = await res.json();
            const corpo = document.querySelector('#tabelaPermutas tbody');
            corpo.innerHTML = "";

            dados.forEach(p => {
                corpo.innerHTML += `
                <tr>
                    <td>${p.solicitanteNome}<br><small>${p.solicitanteMatricula}</small></td>
                    <td>${p.substitutoNome}<br><small>${p.substitutoMatricula}</small></td>
                    <td>${p.dataServico}</td>
                    <td><span class="status-badge ${p.status}">${p.status}</span></td>
                    <td>
                        ${p.status === 'PENDENTE' ? `
                            <button class="btn-aceitar" onclick="decidir(${p.id}, 'homologar')">ACEITAR</button>
                            <button class="btn-negar" onclick="decidir(${p.id}, 'negar')">NEGAR</button>
                        ` : '---'}
                    </td>
                </tr>`;
            });
        }

        async function decidir(id, rota) {
            if(confirm("Deseja confirmar esta decisão?")) {
                await fetch(`/${rota}/${id}`, { method: 'PUT' });
                carregar();
            }
        }

        carregar();
        setInterval(carregar, 5000); // Atualiza a cada 5 segundos
    </script>
</body>
</html>
