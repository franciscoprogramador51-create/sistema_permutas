<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBMCE - Solicitação de Permuta</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 15px; margin: 0; }
        .topo { background: #c0392b; color: #f1c40f; padding: 20px; text-align: center; border-bottom: 4px solid #f1c40f; }
        .card { background: white; padding: 20px; margin-top: 10px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        label { font-weight: bold; display: block; margin-top: 15px; color: #2c3e50; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .btn-enviar { width: 100%; background: #c0392b; color: white; border: none; padding: 15px; margin-top: 25px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        footer { margin-top: 40px; padding: 20px; text-align: center; background: #333; color: #fff; font-size: 12px; border-radius: 8px 8px 0 0; }
    </style>
</head>
<body>
    <div class="topo">
        <h2 style="margin:0;">🔥 CBMCE</h2>
        <small>SOLICITAÇÃO DE PERMUTA DIGITAL</small>
    </div>

    <div class="card">
        <label>TIPO DE PERMUTA:</label>
        <select id="tipo">
            <option value="Simples (12h)">Simples (12 Horas)</option>
            <option value="Dupla (24h)">Dupla (24 Horas)</option>
        </select>

        <label>SOLICITANTE (Posto/Grad e Nome Completo):</label>
        <input type="text" id="solNome" placeholder="Ex: Sgt Elias - Francisco Elias">
        <label>MATRÍCULA DO SOLICITANTE:</label>
        <input type="text" id="solMat" placeholder="Ex: 123.456-1-X">

        <hr style="margin-top:20px; opacity: 0.2;">

        <label>SUBSTITUTO (Posto/Grad e Nome Completo):</label>
        <input type="text" id="subNome" placeholder="Ex: Sgt Silva - João Silva">
        <label>MATRÍCULA DO SUBSTITUTO:</label>
        <input type="text" id="subMat" placeholder="Ex: 987.654-1-Y">

        <label>DATA DO SERVIÇO:</label>
        <input type="date" id="data">

        <button class="btn-enviar" onclick="enviar()">ENVIAR PARA DESPACHO</button>
    </div>

    <footer>
        © 2026 CBMCE - Sistema de Gestão de Escalas<br>
        <a href="/admin.html" style="color: #f1c40f; text-decoration: none;">Acesso Restrito - Comandante</a>
    </footer>

    <script>
        async function enviar() {
            const dados = {
                solicitanteNome: document.getElementById('solNome').value,
                solicitanteMatricula: document.getElementById('solMat').value,
                substitutoNome: document.getElementById('subNome').value,
                substitutoMatricula: document.getElementById('subMat').value,
                dataServico: document.getElementById('data').value,
                tipoPermuta: document.getElementById('tipo').value
            };

            // Validação rigorosa
            if(!dados.solicitanteNome || !dados.solicitanteMatricula || !dados.substitutoNome || !dados.substitutoMatricula || !dados.dataServico) {
                alert("⚠️ Erro: Todos os campos (Nomes, Matrículas e Data) são obrigatórios!");
                return;
            }

            try {
                const res = await fetch('/permutas', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(dados)
                });

                if (res.ok) {
                    window.location.href = "/status.html";
                } else {
                    alert("Erro ao enviar para o servidor.");
                }
            } catch (error) {
                alert("Erro de conexão. Verifique se o servidor está online.");
            }
        }
    </script>
</body>
</html>
